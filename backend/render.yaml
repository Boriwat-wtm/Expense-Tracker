services:
  - type: web
    name: expense-tracker-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: CORS_ORIGINS
        sync: false
